# ═══════════════════════════════════════════════════════════════════════════════
# CONSULTATIONS SERVICE CONFIGURATION
# Conforme au Kit Commun - Microservice Consultations
# ═══════════════════════════════════════════════════════════════════════════════

server:
  port: 8086

spring:
  application:
    name: consultations-service

  datasource:
    url: jdbc:postgresql://localhost:5437/hospital_consultations
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

# T1.17: Retention policy (years)
retention:
  consultation-years: ${RETENTION_CONSULTATION_YEARS:10}

# Optional: set to audit log endpoint to send PHI_DELETED events (T6.3)
# security:
#   audit:
#     url: http://localhost:9200/audit

logging:
  level:
    root: INFO
    com.hospital.consultation: DEBUG

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# Profil Docker (show-sql disabled for prod/RGPD)
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres-consultations:5432/hospital_consultations
  jpa:
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
