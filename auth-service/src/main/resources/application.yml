# ═══════════════════════════════════════════════════════════════════════════════
# AUTHENTICATION SERVICE CONFIGURATION
# Conforme au Kit Commun - Microservice Auth
# ═══════════════════════════════════════════════════════════════════════════════

server:
  port: 8085

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5436/hospital_auth
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ═══════════════════════════════════════════════════════════════════════════════
# JWT CONFIGURATION
# La clé secrète doit être encodée en Base64 et avoir au moins 256 bits
# ═══════════════════════════════════════════════════════════════════════════════
jwt:
  # Clé secrète encodée en Base64 (256 bits minimum pour HS256)
  secret: dGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tMjU2Yml0cw==
  expiration: 3600000       # 1 heure en millisecondes
  refresh-expiration: 86400000  # 24 heures

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.hospital.auth: DEBUG
    org.springframework.security: DEBUG

---
# Profil Docker
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres-auth:5432/hospital_auth

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
