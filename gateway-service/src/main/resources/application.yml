# ═══════════════════════════════════════════════════════════════════════════════
# API GATEWAY CONFIGURATION - KIT COMMUN
# ═══════════════════════════════════════════════════════════════════════════════

server:
  port: 8080
  # HTTPS/TLS support (T1.2). By default SSL is disabled. To enable HTTPS set
  # SERVER_SSL_ENABLED=true and provide a key store (or use dev keystore from scripts/generate-dev-keystore).
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SERVER_SSL_KEY_ALIAS:gateway}

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      # US1.7: security headers on all responses (HSTS, X-Content-Type-Options, X-Frame-Options, etc.)
      default-filters:
        - name: SecureHeaders
      # When SSL is disabled, HSTS is not sent (override in prod when HTTPS is on)
      filter:
        secure-headers:
          disable: strict-transport-security
      routes:
        # AUTH SERVICE - Authentification JWT
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # PATIENT SERVICE - Gestion des patients
        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=0

        # STAFF SERVICE - Users & Roles
        - id: staff-service
          uri: lb://staff-service
          predicates:
            - Path=/api/staff/**
          filters:
            - StripPrefix=0

        # APPOINTMENT SERVICE - Rendez-vous
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/api/appointments/**
          filters:
            - StripPrefix=0

        # MEDICAL RECORD SERVICE - Dossiers médicaux
        - id: medical-record-service
          uri: lb://medical-record-service
          predicates:
            - Path=/api/medical-records/**
          filters:
            - StripPrefix=0

        # CONSULTATIONS SERVICE - Consultations médicales
        - id: consultations-service
          uri: lb://consultations-service
          predicates:
            - Path=/api/consultations/**
          filters:
            - StripPrefix=0

      # CORS Configuration
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

# JWT verification (T1.3): prefer public key from Secrets (RS256); fallback to shared secret (HS256)
jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tMjU2Yml0cw==}
  # Public key (PEM) for RS256 verification – from Secrets (env JWT_PUBLIC_KEY or mounted file)
  public-key: ${JWT_PUBLIC_KEY:}
  public-key-location: ${JWT_PUBLIC_KEY_LOCATION:}

# Rate limiting (US1.4 / T1.5): middleware, in-memory store; 429 if exceeded
rate-limit:
  requests-per-minute-per-ip: ${RATE_LIMIT_REQUESTS_PER_MINUTE_PER_IP:100}
  requests-per-minute-per-user: ${RATE_LIMIT_REQUESTS_PER_MINUTE_PER_USER:100}
  window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
  excluded-paths:
    - /actuator/health

# Anti-bruteforce by IP (T1.6): counter per IP, TTL block after N failed logins (401/423); 423 when blocked
bruteforce-ip:
  max-failed-attempts: ${BRUTEFORCE_IP_MAX_FAILED_ATTEMPTS:5}
  lockout-duration-minutes: ${BRUTEFORCE_IP_LOCKOUT_DURATION_MINUTES:15}
  login-path: ${BRUTEFORCE_IP_LOGIN_PATH:/api/auth/login}

# Validation middleware (T1.7): schemas + rejection of invalid requests (US1.6 – injection in query/headers)
input-validation:
  enabled: ${INPUT_VALIDATION_ENABLED:true}
  excluded-paths:
    - /actuator/health

# Optional: send ACCESS_DENIED / RATE_LIMIT_EXCEEDED / SUSPICIOUS_INPUT to security-audit-log or IDS (no-op if unset)
# security:
#   audit:
#     url: http://security-audit-log:8080/api/events

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker

# In Docker, use same JWT_SECRET as auth-service (e.g. via env in docker-compose)
# jwt.secret falls back to default if JWT_SECRET not set

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
