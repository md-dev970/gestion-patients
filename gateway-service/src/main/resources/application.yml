# ═══════════════════════════════════════════════════════════════════════════════
# API GATEWAY CONFIGURATION - KIT COMMUN
# ═══════════════════════════════════════════════════════════════════════════════

server:
  port: 8080
  # HTTPS/TLS support for the gateway.
  # By default, SSL is disabled. To enable HTTPS, set SERVER_SSL_ENABLED=true
  # and provide key store configuration via environment variables.
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SERVER_SSL_KEY_ALIAS:gateway}

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        # AUTH SERVICE - Authentification JWT
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # PATIENT SERVICE - Gestion des patients
        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=0

        # STAFF SERVICE - Users & Roles
        - id: staff-service
          uri: lb://staff-service
          predicates:
            - Path=/api/staff/**
          filters:
            - StripPrefix=0

        # APPOINTMENT SERVICE - Rendez-vous
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/api/appointments/**
          filters:
            - StripPrefix=0

        # MEDICAL RECORD SERVICE - Dossiers médicaux
        - id: medical-record-service
          uri: lb://medical-record-service
          predicates:
            - Path=/api/medical-records/**
          filters:
            - StripPrefix=0

        # CONSULTATIONS SERVICE - Consultations médicales
        - id: consultations-service
          uri: lb://consultations-service
          predicates:
            - Path=/api/consultations/**
          filters:
            - StripPrefix=0

      # CORS Configuration
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

# JWT: same secret as auth-service so gateway can verify tokens (HS256)
jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tMjU2Yml0cw==}

# Rate limiting (US1.4): per IP and per user, configurable limits
rate-limit:
  requests-per-minute-per-ip: ${RATE_LIMIT_REQUESTS_PER_MINUTE_PER_IP:100}
  requests-per-minute-per-user: ${RATE_LIMIT_REQUESTS_PER_MINUTE_PER_USER:100}
  window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
  excluded-paths:
    - /actuator/health

# Optional: send ACCESS_DENIED / RATE_LIMIT_EXCEEDED to security-audit-log or IDS (no-op if unset)
# security:
#   audit:
#     url: http://security-audit-log:8080/api/events

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker

# In Docker, use same JWT_SECRET as auth-service (e.g. via env in docker-compose)
# jwt.secret falls back to default if JWT_SECRET not set

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
