# ═══════════════════════════════════════════════════════════════════════════════
# PATIENT SERVICE CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════
# WHY: Configures the Patient microservice settings.
# Students: Modify database settings for your environment.
# ═══════════════════════════════════════════════════════════════════════════════

server:
  port: 8081  # Each microservice runs on a different port

spring:
  application:
    name: patient-service  # This name is used for Eureka registration

  # ═══════════════════════════════════════════════════════════════════════════
  # DATABASE CONFIGURATION
  # WHY: Each microservice has its OWN database (database per service pattern)
  # Students: Update credentials for your environment
  # ═══════════════════════════════════════════════════════════════════════════
  datasource:
    url: jdbc:postgresql://localhost:5432/hospital_patients
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # ═══════════════════════════════════════════════════════════════════════════
  # JPA/HIBERNATE CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════════
  jpa:
    hibernate:
      # WHY update: Auto-creates/updates tables. Use 'validate' in production.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ═══════════════════════════════════════════════════════════════════════════════
# EUREKA CLIENT CONFIGURATION
# WHY: Registers this service with the discovery server
# ═══════════════════════════════════════════════════════════════════════════════
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# ═══════════════════════════════════════════════════════════════════════════════
# ACTUATOR CONFIGURATION
# WHY: Exposes health endpoints for monitoring and orchestration
# ═══════════════════════════════════════════════════════════════════════════════
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# T1.17 / T1.18: Retention policy and scheduled purge.
retention:
  patient-years: ${RETENTION_PATIENT_YEARS:10}
  purge:
    enabled: ${RETENTION_PURGE_ENABLED:false}
    cron: ${RETENTION_PURGE_CRON:0 0 2 * * ?}

# Optional: set to audit log endpoint to send PHI_DELETED events (T6.3)
# security:
#   audit:
#     url: http://localhost:9200/audit

# ═══════════════════════════════════════════════════════════════════════════════
# LOGGING CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════
logging:
  level:
    root: INFO
    com.hospital.patient: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

---
# Profil Docker (show-sql disabled for prod/RGPD)
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres-patients:5432/hospital_patients
  jpa:
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/

